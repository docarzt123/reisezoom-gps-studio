name: Build macOS Intel (Test)

# ISOLIERTER Test-Build für Intel-Macs (x86_64). Läuft NUR manuell
# (workflow_dispatch) und ist bewusst getrennt von release.yml, damit die
# reguläre arm64-Release-Pipeline null berührt wird. Baut nur GPS Studio
# (kein Geotagger), signiert + notarisiert, hängt die DMG als Artifact an.
#
# Zweck: prüfen, ob ein natives Intel-Build sauber durchläuft und beim
# Tester (Intel-Mac) funktioniert. Wenn ja → ggf. dauerhaft in release.yml
# aufnehmen. Wenn nein → diese Datei einfach löschen (ein Revert).

on:
  workflow_dispatch: {}

jobs:
  build-macos-intel:
    name: Build macOS Intel DMG (Test)
    runs-on: macos-13   # x86_64 (Intel)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium ins Bundle (pw-browsers/)
        run: |
          PLAYWRIGHT_BROWSERS_PATH="$PWD/pw-browsers" python -m playwright install chromium-headless-shell
          ls -la pw-browsers

      - name: Build User-Guide HTML
        run: python3 scripts/build_user_guide_html.py

      - name: Vendor exiftool (macOS)
        run: bash scripts/setup_vendor_exiftool.sh

      - name: Build .app
        run: |
          pyinstaller ReisezoomGPSStudio.spec --clean --noconfirm
          ls -la dist/

      - name: Signing-Zertifikat importieren (falls Secrets vorhanden)
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERT_P12_BASE64:-}" ]; then
            echo "ℹ️ Keine Signing-Secrets → Ad-hoc (unverändert)"; exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KPW="$(openssl rand -base64 24)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[”"]//g')
          IDENT="$(security find-identity -v -p codesigning "$KEYCHAIN" | grep 'Developer ID Application' | head -1 | sed -E 's/.*"(.*)".*/\1/')"
          if [ -z "$IDENT" ]; then echo "::error::Keine 'Developer ID Application'-Identität im .p12 gefunden"; exit 1; fi
          echo "MACOS_SIGN_IDENTITY=$IDENT" >> "$GITHUB_ENV"
          echo "✅ Signing-Identität: $IDENT"

      - name: Codesign GPS Studio (Developer ID / Ad-hoc-Fallback)
        run: bash scripts/macos_sign.sh "dist/Reisezoom GPS Studio.app"

      - name: Build DMG
        run: |
          brew install create-dmg || true
          mkdir -p dist/dmg
          # Eigener Intel-Dateiname — kollidiert NICHT mit dem arm-Release.
          DMG="dist/dmg/ReisezoomGPSStudio-macos-intel.dmg"
          create-dmg \
            --volname "Reisezoom GPS Studio" \
            --window-pos 200 120 \
            --window-size 720 420 \
            --icon-size 120 \
            --icon "Reisezoom GPS Studio.app" 180 200 \
            --app-drop-link 540 200 \
            --no-internet-enable \
            "$DMG" \
            "dist/Reisezoom GPS Studio.app" || \
          hdiutil create -volname "Reisezoom GPS Studio" \
            -srcfolder "dist/Reisezoom GPS Studio.app" \
            -ov -format UDZO "$DMG"
          ls -la dist/dmg/

      - name: Notarisieren + stapeln (Intel DMG)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bash scripts/macos_notarize.sh "dist/dmg/ReisezoomGPSStudio-macos-intel.dmg"

      - name: Upload Intel DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReisezoomGPSStudio-macos-intel
          path: dist/dmg/ReisezoomGPSStudio-macos-intel.dmg
          if-no-files-found: error
          retention-days: 7
