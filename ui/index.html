<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Reisezoom GPS Studio</title>

<!-- ══ v0.9.446 — START-DIAGNOSE ══════════════════════════════════════════
     MUSS als ERSTES Script laufen und ist bewusst reines ES5 (kein let/const,
     keine Arrow-Functions, kein optional chaining). Grund: wenn eine spätere
     Datei gar nicht lädt ODER moderne Syntax auf einer alten WebKit-Version
     nicht geparst werden kann, ist dieses Script die letzte Instanz, die dem
     Nutzer noch etwas Lesbares zeigen kann — statt eines weißen Fensters.
     Es meldet den Fehler zusätzlich ins app.log (über die pywebview-Bridge). -->
<script>
(function () {
  var shown = false;
  window.__rzBooted = false;
  // v0.9.472 — true, solange der First-Run-Dialog (Mapbox-Token) berechtigt auf den
  // Nutzer wartet. Der Watchdog wertet DAS NICHT als „hängt" (sonst legt sich der
  // „konnte nicht starten"-Screen über den Dialog, wenn ein DAU >25 s überlegt).
  window.__rzOnboarding = false;
  window.__rzStartErrors = [];

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }
  function logPath() {
    var p = (navigator.platform || '') + ' ' + (navigator.userAgent || '');
    if (/Win/i.test(p)) return '%APPDATA%\\Reisezoom GPS Studio\\logs\\app.log';
    if (/Mac|iPhone|iPad/i.test(p)) return '~/Library/Application Support/Reisezoom GPS Studio/logs/app.log';
    return '~/.local/share/Reisezoom GPS Studio/logs/app.log';
  }
  function toBackend(msg) {
    try {
      if (window.pywebview && window.pywebview.api && window.pywebview.api.log_js) {
        window.pywebview.api.log_js('error', 'STARTFEHLER: ' + msg);
      }
    } catch (e) {}
  }

  // v0.9.472 — Anleitung, wenn macOS die App aus einem gesperrten Ordner ausführt
  // (App Translocation: App wurde direkt aus DMG/Downloads gestartet statt aus
  // /Programme). Das ist der häufigste „beschädigt"-Fall beim Beta-Tester.
  function transloBanner() {
    return '<div style="background:#3a2a10;border:1px solid #ff6b35;border-radius:8px;padding:14px 16px;margin-bottom:22px">' +
      '<div style="font-size:16px;font-weight:700;color:#ffb38a;margin-bottom:8px">⚠️ Die App muss noch richtig installiert werden</div>' +
      '<div style="color:#e6c9b3;font-size:13px;margin-bottom:10px">macOS führt die App gerade aus einem geschützten Ordner aus, weil sie direkt aus dem Download-Fenster gestartet wurde — deshalb meldet sie „beschädigt". So läuft sie wieder:</div>' +
      '<ol style="color:#e6c9b3;font-size:13px;margin:0;padding-left:18px;line-height:1.75">' +
        '<li>Dieses Fenster schließen.</li>' +
        '<li>Das Download-Fenster mit dem <b>Reisezoom-Symbol</b> öffnen und das Symbol <b>in den Ordner „Programme" ziehen</b> — nicht doppelklicken, sondern rüberziehen.</li>' +
        '<li>Die App danach aus dem <b>Programme-Ordner</b> (oder Launchpad) starten. Beim ersten Mal ggf. <b>Rechtsklick → „Öffnen"</b>.</li>' +
      '</ol>' +
    '</div>';
  }

  window.__rzShowStartError = function (title, detail) {
    window.__rzStartErrors.push(title + ' | ' + detail);
    toBackend(title + ' | ' + detail);
    if (shown) return;
    shown = true;

    var BTN = 'font:600 13px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;' +
      'border:0;border-radius:8px;padding:9px 15px;cursor:pointer;margin-right:8px;margin-bottom:8px;';
    var lp = logPath();
    // Translocation erkennen: der fehlgeschlagene Datei-Pfad im Fehlertext enthält
    // dann „/AppTranslocation/". (Zusätzlich fragen wir unten das Backend, falls der
    // Fehler ohne Pfad kam — z. B. Zeitüberschreitung.)
    var isTranslo = /AppTranslocation/i.test(String(detail || ''));

    var box = document.createElement('div');
    box.id = 'rz-start-error';
    box.setAttribute('style',
      'position:fixed;left:0;top:0;right:0;bottom:0;z-index:2147483647;' +
      'background:#0e1117;color:#c9d1d9;overflow:auto;padding:30px 22px;' +
      'font:14px/1.6 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif');
    box.innerHTML =
      '<div style="max-width:640px;margin:0 auto">' +
        '<div style="font-size:21px;font-weight:700;color:#fff;margin-bottom:6px">' +
          'Reisezoom GPS Studio konnte nicht starten</div>' +
        '<div style="color:#8b949e;margin-bottom:20px" id="rz-se-sub">' +
          (isTranslo ? 'Fast geschafft — es fehlt nur der letzte Installations-Schritt.'
                     : 'Die Programmoberfläche konnte nicht geladen werden.') + '</div>' +
        '<div id="rz-translo">' + (isTranslo ? transloBanner() : '') + '</div>' +
        '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px 14px;margin-bottom:22px">' +
          '<div style="color:#ff6b35;font-weight:600;margin-bottom:4px">' + esc(title) + '</div>' +
          '<div style="color:#8b949e;font-size:12.5px;word-break:break-word">' + esc(detail) + '</div>' +
        '</div>' +
        '<div style="font-weight:600;color:#fff;margin-bottom:6px" id="rz-se-loghead">Klappt es trotzdem nicht? Schick uns den Log</div>' +
        '<div style="margin-bottom:12px">Der Log zeigt genau, was schiefgelaufen ist — am einfachsten so:</div>' +
        '<div style="margin-bottom:12px">' +
          '<button id="rz-desktop-log" style="' + BTN + 'background:#ff6b35;color:#fff">📄 Log auf den Schreibtisch legen</button>' +
          '<button id="rz-open-log" style="' + BTN + 'background:#21262d;color:#c9d1d9">📂 Log-Ordner öffnen</button>' +
        '</div>' +
        '<div style="color:#8b949e;font-size:12.5px;border-top:1px solid #30363d;padding-top:14px">' +
          'Der Schreibtisch-Knopf legt eine Datei <b>Reisezoom-GPS-Studio-Log….txt</b> auf deinen Schreibtisch — ' +
          'die kannst du einfach in die Mail an Marc ziehen. Bitte zusammen mit einem Screenshot von ' +
          '<b>Apple-Menü → „Über diesen Mac"</b> — damit ist das Problem meist sofort klar.' +
        '</div>' +
      '</div>';
    (document.body || document.documentElement).appendChild(box);

    // v0.9.472 — DAU-sicher: kompletten Log als Datei auf den Schreibtisch legen.
    var db = document.getElementById('rz-desktop-log');
    if (db) db.onclick = function () {
      db.disabled = true;
      function failMsg() { db.disabled = false; alert('Konnte den Log nicht ablegen. Bitte „📂 Log-Ordner öffnen" nutzen und die Datei app.log von Hand anhängen.'); }
      try {
        var pr = window.pywebview.api.save_log_to_desktop();
        if (pr && pr.then) {
          pr.then(function (res) {
            if (res && res.ok) { db.textContent = '✓ Liegt auf dem Schreibtisch — in die Mail ziehen'; }
            else { failMsg(); }
          }).catch(failMsg);
        } else { db.textContent = '✓ Liegt auf dem Schreibtisch — in die Mail ziehen'; }
      } catch (e) { failMsg(); }
    };
    var ob = document.getElementById('rz-open-log');
    if (ob) ob.onclick = function () {
      try { window.pywebview.api.open_log(); }
      catch (e) { alert('Bitte den Pfad manuell im Finder öffnen:\n\n' + lp); }
    };

    // v0.9.472 — kam der Fehler ohne AppTranslocation-Pfad im Text (z. B.
    // Zeitüberschreitung), trotzdem das Backend fragen und die Anleitung nachziehen.
    if (!isTranslo) {
      try {
        var api = window.pywebview && window.pywebview.api;
        if (api && api.startup_env) {
          var q = api.startup_env();
          if (q && q.then) q.then(function (env) {
            if (env && env.translocated) {
              var slot = document.getElementById('rz-translo');
              if (slot && !slot.innerHTML) slot.innerHTML = transloBanner();
              var sub = document.getElementById('rz-se-sub');
              if (sub) sub.textContent = 'Fast geschafft — es fehlt nur der letzte Installations-Schritt.';
            }
          }).catch(function () {});
        }
      } catch (e) {}
    }
  };

  // WICHTIG: Der Fehler-Bildschirm erscheint NUR solange die Oberfläche noch nicht
  // steht (__rzBooted). Sonst würde ein harmloser später Fehler die laufende App
  // zudecken. Ins app.log wandert der Fehler aber IMMER.
  function fail(title, detail) {
    if (window.__rzBooted) { toBackend(title + ' | ' + detail); return; }
    window.__rzShowStartError(title, detail);
  }

  // 1) Klassische JS-Fehler (inkl. Syntaxfehler in nachgeladenen Dateien)
  window.onerror = function (msg, src, line) {
    fail('JavaScript-Fehler beim Start',
      msg + (src ? ('  —  ' + String(src).split('/').pop() + ':' + line) : ''));
    return false;
  };
  // 2) Datei konnte gar nicht geladen werden (<script>/<link> 404 o. ä.).
  //    Resource-Fehler steigen nicht zu window.onerror auf → Capture-Phase.
  window.addEventListener('error', function (e) {
    var el = e && e.target;
    if (el && (el.tagName === 'SCRIPT' || el.tagName === 'LINK')) {
      fail('Programmdatei fehlt oder ist beschädigt',
        'Nicht ladbar: ' + (el.src || el.href || '?') +
        '  —  Bitte die App neu aus dem Original-Download installieren.');
    }
  }, true);
  // 3) Abgelehnte Promises — der Start läuft async, ein Fehler darin landet
  //    NICHT bei window.onerror. Häufigster echter Startfehler.
  window.addEventListener('unhandledrejection', function (e) {
    var r = e && e.reason;
    fail('Fehler beim Initialisieren',
      (r && (r.message || r)) ? String(r.message || r) : 'Unbekannter Fehler');
  });
  // 4) Watchdog: nichts abgestürzt, aber die Oberfläche kommt trotzdem nicht hoch
  //    (z. B. hängende Netzwerk-Anfrage) → nach 25 s trotzdem etwas Lesbares zeigen.
  //    v0.9.472 — ABER: der First-Run-Dialog (Mapbox-Token) wartet BERECHTIGT auf den
  //    Nutzer. Solange der offen ist (__rzOnboarding), NICHT als „hängt" werten, sonst
  //    knallt sich der Fehlerscreen über den Dialog (DAU überlegt >25 s → „konnte nicht
  //    starten", Beta-Tester-Bug). Ist der Dialog offen, warten wir weitere 25 s — die
  //    Uhr für den Rest-Boot läuft erst weiter, wenn der Nutzer entschieden hat.
  (function watchdog() {
    setTimeout(function () {
      if (window.__rzBooted) return;
      if (window.__rzOnboarding) { watchdog(); return; }
      window.__rzShowStartError('Zeitüberschreitung beim Laden',
        'Die Oberfläche hat sich nach 25 Sekunden nicht gemeldet.');
    }, 25000);
  })();
})();
</script>

<header class="topbar">
  <div class="brand">
    <img class="brand-mark" src="assets/icon.png" alt="Reisezoom GPS Studio">
    <div class="brand-text">
      <div class="brand-title">Reisezoom</div>
      <div class="brand-sub" id="brand-sub">GPS&nbsp;Studio</div>
    </div>
  </div>
  <nav class="module-tabs" id="module-tabs">
    <!-- Modul-Tabs werden via JS aus window.RZGPS_MODULES generiert -->
  </nav>
  <!-- v0.8.0: Projekt-Dropdown — wird via JS gefüllt wenn eine Session aktiv ist -->
  <div class="topbar-project" id="topbar-project" hidden>
    <button class="topbar-project-btn" id="topbar-project-btn" type="button">
      <span class="topbar-project-icon">🗂</span>
      <span class="topbar-project-label" id="topbar-project-label">—</span>
      <span class="topbar-project-arrow">▾</span>
    </button>
    <div class="topbar-project-menu" id="topbar-project-menu" hidden>
      <!-- via JS gefüllt -->
    </div>
  </div>
  <div class="topbar-actions">
    <!-- v0.9.288 — Topbar aufgeräumt (Marc): YouTube/Blog/Feedback/Hilfe sind
         jetzt im macOS-Menü („Datei" / „Hilfe"). Topbar = nur noch ⚙ + Version. -->
    <button class="topbar-settings" id="topbar-settings" title="Einstellungen">⚙</button>
    <span class="version" id="topbar-version">v0.2</span>
  </div>
</header>

<!-- v0.9.280 (Nutzer-Wunsch) — Update-Hinweis-Banner. Per JS bei Start befüllt
     wenn GitHub eine neuere Version meldet. Dismissbar pro Version. -->
<div class="update-banner" id="update-banner" hidden>
  <span class="update-banner-icon">⬆️</span>
  <span class="update-banner-text" id="update-banner-text"></span>

  <button class="update-banner-x" id="update-banner-close" type="button" title="Ausblenden">✕</button>
</div>

  <span class="source-missing-banner-text" id="source-missing-banner-text"></span>
  <button class="source-missing-banner-pick" id="source-missing-banner-pick" type="button">Datei neu wählen</button>
  <button class="source-missing-banner-x" id="source-missing-banner-close" type="button" title="Ausblenden">✕</button>
</div>

</main>
